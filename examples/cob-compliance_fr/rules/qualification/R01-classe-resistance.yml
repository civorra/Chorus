REGLE: classe-resistance
CHERCHER:
  p:
    attribut: besoin_qualification
EXCEPTION: defined $p->{qualifie}
CONDITION: defined $p->{classe_bois}
EFFET: |
  my $classe_min = classe_min_pour_type($p->{type_element});
  return 0 unless defined $classe_min;
  unless (classe_ok($p->{classe_bois}, $classe_min)) {
    $p->set('qualifie',    'NON');
    $p->set('motif_refus', "Classe bois $p->{classe_bois} < $classe_min requis (art.2.1)");
    return 1;
  }
  0
