REGLE: joint-longitudinal
CHERCHER:
  p:
    attribut: besoin_ossature
EXCEPTION: defined $p->{ossature_ok}
CONDITION: '$p->{type_element} eq "montant_porteur"'
EFFET: |
  if ($p->{a_joint_longitudinal}) {
    $p->set('ossature_ok',        'NON');
    $p->set('raison_ossature_ko', "Joint longitudinal interdit sur montant porteur (art.3.4)");
    return 1;
  }
  0
