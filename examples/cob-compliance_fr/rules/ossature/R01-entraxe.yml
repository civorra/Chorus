REGLE: entraxe
CHERCHER:
  p:
    attribut: besoin_ossature
EXCEPTION: defined $p->{ossature_ok}
CONDITION: defined $p->{entraxe_mm}
EFFET: |
  my $e = $p->{entraxe_mm};
  if ($e < 300 || $e > 625) {
    $p->set('ossature_ok',        'NON');
    $p->set('raison_ossature_ko', "Entraxe ${e}mm hors [300-625]mm (art.3.1)");
    return 1;
  }
  0
