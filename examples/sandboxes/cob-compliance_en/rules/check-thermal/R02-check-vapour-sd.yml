# Agent: TimberFrame::Agent::CheckThermal
# Source corpus: §4.2 — BS 5250 / BS EN ISO 13788 — Vapour control Sd ≥ Sd_min by service class

RULE: R02-check-vapour-sd
FIND:
  e:
    attribut: needs_thermal
EXCEPTION: 'defined $e->{thermal_ok}'
ACTION: |
  return 0 unless ($e->get('element_type') // '') eq 'vapour_control';
  my $sd = $e->get('vapour_sd_m');
  my $sc = $e->get('service_class');
  return 0 unless defined $sd && defined $sc;
  my $sd_min = _sd_min_for_service_class($sc);
  return 0 unless $sd < $sd_min;
  $e->set('thermal_ok', 'NO');
  $e->delete('needs_thermal');
  1
