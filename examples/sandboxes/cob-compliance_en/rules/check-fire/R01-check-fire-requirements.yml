# Agent: TimberFrame::Agent::CheckFire
# Source corpus: §5.1 — Building Regs Part B / BS EN 13501-2 — REI period by occupancy
#                §5.2 — BS EN 13501-1 — Lining reaction class (A1/A2) + surface mass ≥ 8 kg/m²
#                §5.3 — Building Regs Part B §B3 — Plasterboard thickness
# Combined fire-safety check. Conservative defaults: absent slots treated as worst-case.

RULE: R01-check-fire-requirements
FIND:
  e:
    attribut: needs_fire
EXCEPTION: 'defined $e->{fire_ok}'
ACTION: |
  my %_EC_RANK = (A1=>1, A2=>2, B=>3, C=>4, D=>5, E=>6, F=>7);
  my $coll     = $e->get('collective')                 // 0;
  my $rei      = $e->get('fire_rei')                   // 0;
  my $rei_min  = $coll ? 60 : 30;
  my $rc       = uc($e->get('lining_reaction_class')   // 'F');
  my $mass     = $e->get('lining_surface_mass_kg')     // 0;
  my $pb_thick = $e->get('plasterboard_thickness_mm')  // 0;
  my $pb_min   = $coll ? 25 : 12.5;
  my $rc_rank  = exists $_EC_RANK{$rc} ? $_EC_RANK{$rc} : 99;
  my $fail = ($rei < $rei_min)
          || ($rc_rank > 2)
          || ($mass < 8)
          || ($pb_thick < $pb_min);
  return 0 unless $fail;
  $e->set('fire_ok', 'NO');
  $e->delete('needs_fire');
  1
