# Agent: TimberFrame::Agent::CheckGeometry
# Source corpus: §3.4 — BS EN 1995-1-1 §5.4 — No longitudinal splice on load-bearing studs

RULE: R03-check-splice
FIND:
  e:
    attribut: needs_geometry
EXCEPTION: 'defined $e->{frame_ok}'
ACTION: |
  return 0 unless ($e->get('element_type') // '') eq 'load_bearing_stud';
  return 0 unless ($e->get('has_longitudinal_splice') // 0) == 1;
  $e->set('frame_ok', 'NO');
  $e->delete('needs_geometry');
  1
