# Agent: TimberFrame::Agent::CheckGeometry
# Catch-all: approves every element not rejected by R01-R03.
# Ensures needs_fire=1 is present for routing to Agent 4.

RULE: R04-geometry-pass
FIND:
  e:
    attribut: needs_geometry
EXCEPTION: 'defined $e->{frame_ok}'
ACTION: |
  $e->set('frame_ok', 'YES');
  $e->delete('needs_geometry');
  $e->set('needs_fire', 1) unless defined $e->get('needs_fire');
  1
