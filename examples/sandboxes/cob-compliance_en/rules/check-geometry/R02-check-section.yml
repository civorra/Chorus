# Agent: TimberFrame::Agent::CheckGeometry
# Source corpus: §3.2 — BS EN 1995-1-1 §5.2 — LB stud cross-section matrix
#                §3.3 — Non-load-bearing stud minimum 38x63 mm
# Rejects elements whose cross-section is below the normative minimum.

RULE: R02-check-section
FIND:
  e:
    attribut: needs_geometry
EXCEPTION: 'defined $e->{frame_ok}'
ACTION: |
  my $b = $e->get('section_b_mm');
  my $h = $e->get('section_h_mm');
  return 0 unless defined $b && defined $h;
  my $type = $e->get('element_type') // '';
  my ($b_min, $h_min);
  if ($type eq 'non_load_bearing_stud') {
      ($b_min, $h_min) = (38, 63);
  } else {
      ($b_min, $h_min) = _min_section_for_lb_stud(
          $e->get('clear_height_mm') // 0,
          $e->get('stud_spacing_mm') // 0);
  }
  return 0 unless $b < $b_min || $h < $h_min;
  $e->set('frame_ok', 'NO');
  $e->delete('needs_geometry');
  1
