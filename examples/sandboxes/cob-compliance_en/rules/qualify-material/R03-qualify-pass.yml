# Agent: TimberFrame::Agent::QualifyMaterial
# Source corpus: §1.1 element types, §6.1 routing
# Catch-all: qualifies every element not rejected by R01/R02.
# Sets downstream presence slots: needs_geometry (structural), needs_thermal (insulation/vapour),
# needs_fire (all elements unconditionally — §5 applies to every type).

RULE: R03-qualify-pass
FIND:
  e:
    attribut: needs_qualify
EXCEPTION: 'defined $e->{qualified}'
ACTION: |
  my $type = $e->get('element_type') // '';
  $e->set('qualified', 'YES');
  $e->delete('needs_qualify');
  if ($type eq 'load_bearing_stud'
      || $type eq 'sole_plate'
      || $type eq 'top_plate') {
      $e->set('needs_geometry', 1);
  }
  if ($type eq 'insulation' || $type eq 'vapour_control') {
      $e->set('needs_thermal', 1);
  }
  $e->set('needs_fire', 1);
  1
