# Agent: TimberFrame::Agent::QualifyMaterial
# Source corpus: §2.1 — BS EN 338 — Minimum strength class by element type
# Rejects any sawn-timber element whose strength class is below the required minimum.
# Non-timber elements (insulation, vapour_control) carry no strength_class → skipped.

RULE: R01-check-strength-class
FIND:
  e:
    attribut: needs_qualify
EXCEPTION: 'defined $e->{qualified}'
ACTION: |
  my $sc   = $e->get('strength_class');
  return 0 unless defined $sc;
  my $type = $e->get('element_type') // '';
  my $min  = _min_class_rank_for_type($type);
  return 0 unless $min > 0;
  return 0 unless _strength_class_rank($sc) < $min;
  $e->set('qualified', 'NO');
  $e->delete('needs_qualify');
  1
