# Agent: TimberFrame::Agent::QualifyMaterial
# Source corpus: §2.2 — BS EN 1995-1-1 §2.3 — Moisture content [10%, 18%]
#                §2.3 — EC5 §7.2 — Instantaneous deflection ≤ L/300
# Rejects any timber element with out-of-range moisture or excessive deflection.
# Insulation and vapour_control elements are excluded.

RULE: R02-check-moisture-deflection
FIND:
  e:
    attribut: needs_qualify
EXCEPTION: 'defined $e->{qualified}'
ACTION: |
  my $type = $e->get('element_type') // '';
  return 0 if $type eq 'insulation' || $type eq 'vapour_control';
  my $moisture = $e->get('moisture_pct');
  my $defl     = $e->get('measured_deflection_mm');
  my $span     = $e->get('span_mm');
  my $fail = 0;
  if (defined $moisture && ($moisture < 10 || $moisture > 18)) {
      $fail = 1;
  }
  if (!$fail && defined $defl && defined $span && $span > 0
      && $defl > $span / 300) {
      $fail = 1;
  }
  return 0 unless $fail;
  $e->set('qualified', 'NO');
  $e->delete('needs_qualify');
  1
