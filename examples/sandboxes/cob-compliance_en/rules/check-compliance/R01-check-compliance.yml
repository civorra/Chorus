# Agent: TimberFrame::Agent::CheckCompliance
# Source corpus: §6.1 — Global compliance conditions by element type
# Evaluates per-element compliance based on all upstream phase results.
# NOTE: pipeline termination (solved()) is NOT here — handled via addrule() in chorus-check.

RULE: R01-check-compliance
FIND:
  e:
    attribut: needs_compliance
EXCEPTION: 'defined $e->{compliance_status}'
ACTION: |
  my $type      = $e->get('element_type') // '';
  my $qualified = $e->get('qualified')    // 'NO';
  my $fire_ok   = $e->get('fire_ok')      // 'NO';
  my %needs_frame   = map { $_ => 1 } qw(load_bearing_stud sole_plate top_plate);
  my %needs_thermal = map { $_ => 1 } qw(insulation vapour_control);
  my $frame_ok   = $needs_frame{$type}   ? ($e->get('frame_ok')   // 'NO') : 'YES';
  my $thermal_ok = $needs_thermal{$type} ? ($e->get('thermal_ok') // 'NO') : 'YES';
  my $compliant  = ($qualified  eq 'YES'
                 && $frame_ok   eq 'YES'
                 && $thermal_ok eq 'YES'
                 && $fire_ok    eq 'YES');
  $e->set('compliance_status', $compliant ? 'COMPLIANT' : 'NON_COMPLIANT');
  $e->delete('needs_compliance');
  1
