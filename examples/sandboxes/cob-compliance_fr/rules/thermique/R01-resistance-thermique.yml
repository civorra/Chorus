REGLE: resistance-thermique
CHERCHER:
  p:
    attribut: besoin_thermique
EXCEPTION: defined $p->{thermique_ok}
CONDITION: type_est_isolant($p->{type_element})
EFFET: |
  my $r = calcul_r($p->{epaisseur_mm}, $p->{lambda_w_mk});
  my $r_min = r_min_zone($p->{zone_climatique});
  my $r_r = int($r * 100 + 0.5) / 100;
  $p->set('r_thermique', $r_r);
  if ($r < $r_min) {
    $p->set('thermique_ok',        'NON');
    $p->set('raison_thermique_ko', "R=${r_r} m2.K/W < R_min=${r_min} zone $p->{zone_climatique} (art.4.1)");
    return 1;
  }
  $p->set('thermique_ok', 'OUI');
  1
