REGLE: fleche
CHERCHER:
  p:
    attribut: besoin_qualification
EXCEPTION: defined $p->{qualifie}
CONDITION: defined $p->{fleche_mesuree_mm}
EFFET: |
  my $f_adm = fleche_admissible_mm($p->{portee_mm});
  my $f_mes = $p->{fleche_mesuree_mm};
  if ($f_mes > $f_adm) {
    my $f_adm_r = int($f_adm * 10 + 0.5) / 10;
    $p->set('qualifie',    'NON');
    $p->set('motif_refus', "Fleche ${f_mes}mm > L/300=${f_adm_r}mm (art.2.3)");
    return 1;
  }
  0
